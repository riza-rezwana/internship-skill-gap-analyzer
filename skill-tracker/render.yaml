services:
  - type: web
    name: student-skill-tracker
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: node src/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
